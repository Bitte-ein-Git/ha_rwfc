name: Release » 'master'

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GH_TOKEN }}
      # Pack the ha_rwfc dir as a zip and upload to the release
      - name: Zip rwfc dir
        run: |
          cd /home/runner/work/ha_rwfc/ha_rwfc/custom_components/rwfc
          zip rwfc.zip -r ./
      - name: Set release variable
        run: |
          echo "release_version=`git describe --abbrev=0`" >> $GITHUB_ENV
      - name: Sleep
        # add delay so upload does not kill the release notes from semantic-release
        run: |
          sleep 5
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /home/runner/work/ha_rwfc/ha_rwfc/custom_components/rwfc/rwfc.zip
          asset_name: rwfc.zip
          tag: ${{ env.release_version }}
          overwrite: true
      - name: Push changes to master
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master